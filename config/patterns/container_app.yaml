name: container_app
description: |
  Azure Container App with Container App Environment, security groups,
  and role assignments. Supports HTTP ingress and scaling.
category: single-resource
components:
  - resource-group
  - container-app
  - container-app-environment
  - security-groups
  - rbac-assignments
use_cases:
  - Microservice deployment
  - API hosting
  - Web application backend
  - Background job processing
sizing:
  small:
    prototype: { cpu: 0.25, memory: "0.5Gi", min_replicas: 0, max_replicas: 1 }
    dev: { cpu: 0.25, memory: "0.5Gi", min_replicas: 0, max_replicas: 1 }
    tst: { cpu: 0.25, memory: "0.5Gi", min_replicas: 0, max_replicas: 1 }
    stg: { cpu: 0.5, memory: "1Gi", min_replicas: 1, max_replicas: 2 }
    prd: { cpu: 0.5, memory: "1Gi", min_replicas: 2, max_replicas: 5 }
  medium:
    prototype: { cpu: 0.5, memory: "1Gi", min_replicas: 0, max_replicas: 2 }
    dev: { cpu: 0.5, memory: "1Gi", min_replicas: 0, max_replicas: 2 }
    tst: { cpu: 0.5, memory: "1Gi", min_replicas: 0, max_replicas: 2 }
    stg: { cpu: 1.0, memory: "2Gi", min_replicas: 1, max_replicas: 5 }
    prd: { cpu: 1.0, memory: "2Gi", min_replicas: 2, max_replicas: 10 }
  large:
    prototype: { cpu: 1.0, memory: "2Gi", min_replicas: 0, max_replicas: 3 }
    dev: { cpu: 1.0, memory: "2Gi", min_replicas: 0, max_replicas: 3 }
    tst: { cpu: 1.0, memory: "2Gi", min_replicas: 0, max_replicas: 3 }
    stg: { cpu: 2.0, memory: "4Gi", min_replicas: 2, max_replicas: 10 }
    prd: { cpu: 2.0, memory: "4Gi", min_replicas: 3, max_replicas: 20 }
  xlarge:
    prototype: { cpu: 2.0, memory: "4Gi", min_replicas: 1, max_replicas: 5 }
    dev: { cpu: 2.0, memory: "4Gi", min_replicas: 1, max_replicas: 5 }
    tst: { cpu: 2.0, memory: "4Gi", min_replicas: 1, max_replicas: 5 }
    stg: { cpu: 4.0, memory: "8Gi", min_replicas: 3, max_replicas: 20 }
    prd: { cpu: 4.0, memory: "8Gi", min_replicas: 5, max_replicas: 30 }
tier_defaults:
  1: { min_replicas: 3 }
  2: { min_replicas: 2 }
  3: { min_replicas: 1 }
  4: { min_replicas: 0 }
config:
  required:
    - name
  optional:
    - container_image:
        type: string
        default: "mcr.microsoft.com/k8se/quickstart:latest"
        description: Container image to deploy
    - target_port:
        type: number
        default: 80
        description: Target port for ingress
    - external_ingress:
        type: boolean
        default: true
        description: Allow external (internet) ingress
