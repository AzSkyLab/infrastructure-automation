name: web_backend
description: |
  Composite pattern: Container App + PostgreSQL + Key Vault + Container Registry.
  Full web backend with database, secret management, container registry, and HTTP ingress.
category: composite
components:
  - resource-group
  - container-app
  - container-app-environment
  - container-registry
  - postgresql
  - key-vault
  - security-groups
  - rbac-assignments
use_cases:
  - Full-stack web application backend
  - API service with database
  - Microservice with persistent storage
sizing:
  small:
    prototype: { cpu: 0.25, memory: "0.5Gi", min_replicas: 0, max_replicas: 1, postgresql_sku: "B_Standard_B1ms", postgresql_storage_mb: 32768, acr_sku: "Basic" }
    dev: { cpu: 0.25, memory: "0.5Gi", min_replicas: 0, max_replicas: 1, postgresql_sku: "B_Standard_B1ms", postgresql_storage_mb: 32768, acr_sku: "Basic" }
    tst: { cpu: 0.25, memory: "0.5Gi", min_replicas: 0, max_replicas: 1, postgresql_sku: "B_Standard_B1ms", postgresql_storage_mb: 32768, acr_sku: "Basic" }
    stg: { cpu: 0.5, memory: "1Gi", min_replicas: 1, max_replicas: 2, postgresql_sku: "B_Standard_B2s", postgresql_storage_mb: 65536, acr_sku: "Basic" }
    prd: { cpu: 0.5, memory: "1Gi", min_replicas: 2, max_replicas: 5, postgresql_sku: "GP_Standard_D2s_v3", postgresql_storage_mb: 131072, geo_redundant_backup: true, acr_sku: "Standard" }
  medium:
    prototype: { cpu: 0.5, memory: "1Gi", min_replicas: 0, max_replicas: 2, postgresql_sku: "B_Standard_B2s", postgresql_storage_mb: 65536, acr_sku: "Basic" }
    dev: { cpu: 0.5, memory: "1Gi", min_replicas: 0, max_replicas: 2, postgresql_sku: "B_Standard_B2s", postgresql_storage_mb: 65536, acr_sku: "Basic" }
    tst: { cpu: 0.5, memory: "1Gi", min_replicas: 0, max_replicas: 2, postgresql_sku: "B_Standard_B2s", postgresql_storage_mb: 65536, acr_sku: "Basic" }
    stg: { cpu: 1.0, memory: "2Gi", min_replicas: 1, max_replicas: 5, postgresql_sku: "GP_Standard_D2s_v3", postgresql_storage_mb: 131072, acr_sku: "Standard" }
    prd: { cpu: 1.0, memory: "2Gi", min_replicas: 2, max_replicas: 10, postgresql_sku: "GP_Standard_D4s_v3", postgresql_storage_mb: 262144, geo_redundant_backup: true, acr_sku: "Standard" }
  large:
    prototype: { cpu: 1.0, memory: "2Gi", min_replicas: 0, max_replicas: 3, postgresql_sku: "GP_Standard_D2s_v3", postgresql_storage_mb: 131072, acr_sku: "Standard" }
    dev: { cpu: 1.0, memory: "2Gi", min_replicas: 0, max_replicas: 3, postgresql_sku: "GP_Standard_D2s_v3", postgresql_storage_mb: 131072, acr_sku: "Standard" }
    tst: { cpu: 1.0, memory: "2Gi", min_replicas: 0, max_replicas: 3, postgresql_sku: "GP_Standard_D2s_v3", postgresql_storage_mb: 131072, acr_sku: "Standard" }
    stg: { cpu: 2.0, memory: "4Gi", min_replicas: 2, max_replicas: 10, postgresql_sku: "GP_Standard_D4s_v3", postgresql_storage_mb: 262144, acr_sku: "Premium" }
    prd: { cpu: 2.0, memory: "4Gi", min_replicas: 3, max_replicas: 20, postgresql_sku: "GP_Standard_D8s_v3", postgresql_storage_mb: 524288, geo_redundant_backup: true, acr_sku: "Premium" }
  xlarge:
    prototype: { cpu: 2.0, memory: "4Gi", min_replicas: 1, max_replicas: 5, postgresql_sku: "GP_Standard_D4s_v3", postgresql_storage_mb: 262144, acr_sku: "Standard" }
    dev: { cpu: 2.0, memory: "4Gi", min_replicas: 1, max_replicas: 5, postgresql_sku: "GP_Standard_D4s_v3", postgresql_storage_mb: 262144, acr_sku: "Standard" }
    tst: { cpu: 2.0, memory: "4Gi", min_replicas: 1, max_replicas: 5, postgresql_sku: "GP_Standard_D4s_v3", postgresql_storage_mb: 262144, acr_sku: "Standard" }
    stg: { cpu: 4.0, memory: "8Gi", min_replicas: 3, max_replicas: 20, postgresql_sku: "GP_Standard_D8s_v3", postgresql_storage_mb: 524288, acr_sku: "Premium" }
    prd: { cpu: 4.0, memory: "8Gi", min_replicas: 5, max_replicas: 30, postgresql_sku: "GP_Standard_D16s_v3", postgresql_storage_mb: 1048576, geo_redundant_backup: true, acr_sku: "Premium" }
tier_defaults:
  1: { min_replicas: 3, geo_redundant_backup: true, acr_sku: "Premium" }
  2: { min_replicas: 2, geo_redundant_backup: true, acr_sku: "Standard" }
  3: { min_replicas: 1, acr_sku: "Standard" }
  4: { min_replicas: 0, acr_sku: "Basic" }
config:
  required:
    - name
  optional:
    - container_image:
        type: string
        default: "mcr.microsoft.com/k8se/quickstart:latest"
        description: Container image to deploy
    - target_port:
        type: number
        default: 80
        description: Target port for ingress
    - postgresql_version:
        type: string
        default: "16"
        description: PostgreSQL version
