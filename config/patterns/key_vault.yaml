name: key_vault
description: |
  Azure Key Vault with RBAC authorization, security groups, and role assignments.
  Stores secrets with Secrets User/Officer role assignments.
category: single-resource
components:
  - resource-group
  - key-vault
  - security-groups
  - rbac-assignments
use_cases:
  - Application secret management
  - Certificate storage
  - Encryption key management
sizing:
  small:
    prototype: { sku_name: "standard" }
    dev: { sku_name: "standard" }
    tst: { sku_name: "standard" }
    stg: { sku_name: "standard" }
    prd: { sku_name: "standard" }
  medium:
    prototype: { sku_name: "standard" }
    dev: { sku_name: "standard" }
    tst: { sku_name: "standard" }
    stg: { sku_name: "premium" }
    prd: { sku_name: "premium" }
  large:
    prototype: { sku_name: "premium" }
    dev: { sku_name: "premium" }
    tst: { sku_name: "premium" }
    stg: { sku_name: "premium" }
    prd: { sku_name: "premium" }
  xlarge:
    prototype: { sku_name: "premium" }
    dev: { sku_name: "premium" }
    tst: { sku_name: "premium" }
    stg: { sku_name: "premium" }
    prd: { sku_name: "premium" }
tier_defaults:
  1: { sku_name: "premium", purge_protection_enabled: true, soft_delete_retention_days: 90 }
  2: { sku_name: "premium", purge_protection_enabled: true, soft_delete_retention_days: 30 }
  3: { sku_name: "standard", purge_protection_enabled: true }
  4: { sku_name: "standard" }
config:
  required:
    - name
  optional:
    - sku_name:
        type: string
        default: "standard"
        description: Key Vault SKU (standard or premium)
