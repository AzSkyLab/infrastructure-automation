# Prototype Provisioning Workflow
#
# Triggered by MCP server via workflow_dispatch.
# Runs terraform apply/destroy for a pattern with provided tfvars.

name: Prototype Provision

run-name: "${{ inputs.action }}: ${{ inputs.pattern }} (${{ inputs.environment }})"

on:
  workflow_dispatch:
    inputs:
      pattern:
        description: 'Pattern name (key_vault, storage_account, postgresql, container_app, web_backend)'
        required: true
        type: string
      environment:
        description: 'Target environment (dev, staging, prod)'
        required: true
        type: string
      tfvars_json:
        description: 'Base64-encoded terraform.tfvars.json content'
        required: true
        type: string
      action:
        description: 'Action to perform (create or destroy)'
        required: true
        default: 'create'
        type: choice
        options:
          - create
          - destroy
      state_key:
        description: 'Terraform state key path'
        required: true
        type: string

env:
  TERRAFORM_VERSION: '1.6.0'
  TF_IN_AUTOMATION: 'true'

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    name: "${{ inputs.action }}: ${{ inputs.pattern }} (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Validate inputs
        run: |
          VALID_PATTERNS="key_vault storage_account postgresql container_app web_backend"
          if [[ ! " $VALID_PATTERNS " =~ " ${{ inputs.pattern }} " ]]; then
            echo "::error::Invalid pattern: ${{ inputs.pattern }}"
            exit 1
          fi

          VALID_ENVS="dev staging prod"
          if [[ ! " $VALID_ENVS " =~ " ${{ inputs.environment }} " ]]; then
            echo "::error::Invalid environment: ${{ inputs.environment }}"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Select Azure credentials
        id: creds
        run: |
          case "${{ inputs.environment }}" in
            dev)     echo "client_id=AZURE_CLIENT_ID_dev" >> $GITHUB_OUTPUT ;;
            staging) echo "client_id=AZURE_CLIENT_ID_staging" >> $GITHUB_OUTPUT ;;
            prod)    echo "client_id=AZURE_CLIENT_ID_prod" >> $GITHUB_OUTPUT ;;
          esac

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets[steps.creds.outputs.client_id] }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Decode tfvars
        working-directory: terraform/patterns/${{ inputs.pattern }}
        run: |
          echo "${{ inputs.tfvars_json }}" | base64 -d > terraform.tfvars.json
          echo "Decoded tfvars:"
          cat terraform.tfvars.json | jq '.' 2>/dev/null || cat terraform.tfvars.json

      - name: Terraform Init
        working-directory: terraform/patterns/${{ inputs.pattern }}
        env:
          ARM_CLIENT_ID: ${{ secrets[steps.creds.outputs.client_id] }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER || 'tfstate' }}" \
            -backend-config="key=${{ inputs.state_key }}"

      - name: Terraform Plan
        working-directory: terraform/patterns/${{ inputs.pattern }}
        env:
          ARM_CLIENT_ID: ${{ secrets[steps.creds.outputs.client_id] }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: |
          DESTROY_FLAG=""
          if [ "${{ inputs.action }}" == "destroy" ]; then
            DESTROY_FLAG="-destroy"
          fi

          terraform plan \
            -var-file=terraform.tfvars.json \
            $DESTROY_FLAG \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/patterns/${{ inputs.pattern }}
        env:
          ARM_CLIENT_ID: ${{ secrets[steps.creds.outputs.client_id] }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: terraform apply -auto-approve tfplan
        timeout-minutes: 45

      - name: Capture outputs
        if: inputs.action == 'create'
        working-directory: terraform/patterns/${{ inputs.pattern }}
        env:
          ARM_CLIENT_ID: ${{ secrets[steps.creds.outputs.client_id] }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: |
          echo "## Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          terraform output -json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Provisioning Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pattern | \`${{ inputs.pattern }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | \`${{ inputs.action }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| State Key | \`${{ inputs.state_key }}\` |" >> $GITHUB_STEP_SUMMARY
