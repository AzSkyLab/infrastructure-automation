name: Validate Repo Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6am UTC

permissions:
  contents: read

jobs:
  validate-repos:
    name: Verify pattern repos exist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.INFRA_APP_ID }}
          private-key: ${{ secrets.INFRA_APP_PRIVATE_KEY }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Verify repos exist
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ github.repository_owner }}
        run: |
          python3 << 'EOF'
          import os
          import requests
          import yaml
          from pathlib import Path

          token = os.environ["GH_TOKEN"]
          org = os.environ["ORG"]
          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json",
          }

          errors = []
          warnings = []

          # Shared module repos (always expected)
          shared_repos = [
              "terraform-azurerm-naming",
              "terraform-azurerm-security-groups",
              "terraform-azurerm-rbac-assignments",
              "terraform-azurerm-resource-group",
          ]

          # Build expected repos from pattern YAMLs
          pattern_repos = []
          for f in sorted(Path("config/patterns").glob("*.yaml")):
              with open(f) as fh:
                  data = yaml.safe_load(fh)
              if not data:
                  continue

              name = data.get("name", f.stem)
              category = data.get("category", "single-resource")

              if category == "composite":
                  pattern_repos.append(f"terraform-pattern-{name}")
              else:
                  pattern_repos.append(f"terraform-azurerm-{name}")

          all_repos = shared_repos + pattern_repos

          print(f"Checking {len(all_repos)} repos in {org}...")

          for repo in all_repos:
              resp = requests.get(
                  f"https://api.github.com/repos/{org}/{repo}",
                  headers=headers,
              )
              if resp.status_code == 200:
                  print(f"  {repo}: EXISTS")
              elif resp.status_code == 404:
                  errors.append(f"{repo}: NOT FOUND")
                  print(f"  {repo}: NOT FOUND")
              else:
                  warnings.append(f"{repo}: HTTP {resp.status_code}")
                  print(f"  {repo}: HTTP {resp.status_code}")

          if errors:
              print(f"\n{len(errors)} repos missing:")
              for e in errors:
                  print(f"  ERROR: {e}")
              exit(1)
          else:
              print(f"\nAll {len(all_repos)} repos verified!")
          EOF
