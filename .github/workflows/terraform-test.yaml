# Terraform Tests (Orchestration Hub)
#
# Validates pattern YAML definitions and MCP server code.
# Individual module/pattern validation happens in their own repos.

name: Validate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'config/patterns/**'
      - 'mcp-server/**'
      - '.github/workflows/terraform-test.yaml'
  push:
    branches: [main]
    paths:
      - 'config/patterns/**'
      - 'mcp-server/**'

permissions:
  contents: read

jobs:
  validate-yamls:
    name: Validate Pattern YAMLs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate pattern YAML structure
        run: |
          python3 << 'EOF'
          import yaml
          import sys
          from pathlib import Path

          errors = []
          required_fields = ['name', 'description', 'category', 'components', 'sizing', 'config']
          valid_categories = ['single-resource', 'composite']
          valid_sizes = ['small', 'medium', 'large', 'xlarge']
          valid_envs = ['prototype', 'dev', 'tst', 'stg', 'prd']

          for f in sorted(Path('config/patterns').glob('*.yaml')):
              with open(f) as fh:
                  try:
                      data = yaml.safe_load(fh)
                  except yaml.YAMLError as e:
                      errors.append(f"{f.name}: Invalid YAML: {e}")
                      continue

              if not data:
                  errors.append(f"{f.name}: Empty file")
                  continue

              # Check required fields
              for field in required_fields:
                  if field not in data:
                      errors.append(f"{f.name}: Missing required field: {field}")

              # Validate category
              if data.get('category') not in valid_categories:
                  errors.append(f"{f.name}: Invalid category: {data.get('category')}")

              # Validate sizing has at least small/medium/large
              sizing = data.get('sizing', {})
              for size in ['small', 'medium', 'large']:
                  if size not in sizing:
                      errors.append(f"{f.name}: Missing sizing: {size}")

              # Validate each size has dev/staging/prod
              for size_name, size_data in sizing.items():
                  if size_name not in valid_sizes:
                      errors.append(f"{f.name}: Invalid size: {size_name}")
                  elif isinstance(size_data, dict):
                      for env in valid_envs:
                          if env not in size_data:
                              errors.append(f"{f.name}: Missing env '{env}' in size '{size_name}'")

              print(f"  {f.name}: OK ({data.get('category')})")

          if errors:
              print("\nErrors:")
              for e in errors:
                  print(f"  ERROR: {e}")
              sys.exit(1)
          else:
              print(f"\nAll {len(list(Path('config/patterns').glob('*.yaml')))} pattern YAMLs valid!")
          EOF

  validate-mcp-server:
    name: Validate MCP Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MCP server
        working-directory: mcp-server
        run: pip install -e .

      - name: Check imports
        run: python -c "from mcp_server.src.patterns.loader import load_patterns; print(f'Loaded {len(load_patterns())} patterns')"

      - name: Check resolver
        run: |
          python3 << 'PYEOF'
          from mcp_server.src.patterns.loader import load_patterns
          from mcp_server.src.patterns.resolver import PatternResolver

          patterns = load_patterns()
          resolver = PatternResolver(patterns)

          # Test validation with new fields
          result = resolver.validate_config(
              "key_vault", "dev",
              {"name": "test"},
              {
                  "project": "testproj",
                  "environment": "dev",
                  "business_unit": "eng",
                  "owners": ["test@example.com"],
                  "application_id": "APP001",
                  "application_name": "Test App",
                  "tier": 3,
              }
          )
          assert result["valid"], f"Validation failed: {result['errors']}"
          print("Resolver validation: OK")

          # Test resolution includes new fields
          tfvars = resolver.resolve(
              "key_vault", "dev",
              {"name": "test"},
              {
                  "project": "testproj",
                  "environment": "dev",
                  "business_unit": "eng",
                  "owners": ["test@example.com"],
                  "application_id": "APP001",
                  "application_name": "Test App",
                  "tier": 3,
              }
          )
          assert tfvars["application_id"] == "APP001"
          assert tfvars["tier"] == 3
          print("Resolver resolution: OK")

          # Test XL sizing
          result = resolver.validate_config(
              "key_vault", "dev",
              {"name": "test", "size": "xlarge"},
              {
                  "project": "testproj",
                  "environment": "dev",
                  "business_unit": "eng",
                  "owners": ["test@example.com"],
                  "application_id": "APP001",
                  "application_name": "Test App",
              }
          )
          assert result["valid"], f"XL validation failed: {result['errors']}"
          print("XL sizing validation: OK")

          # Test prototype environment
          result = resolver.validate_config(
              "key_vault", "prototype",
              {"name": "test"},
              {
                  "project": "testproj",
                  "environment": "prototype",
                  "business_unit": "eng",
                  "owners": ["test@example.com"],
                  "application_id": "APP001",
                  "application_name": "Test App",
              }
          )
          assert result["valid"], f"Prototype validation failed: {result['errors']}"
          print("Prototype environment validation: OK")

          print("\nAll resolver checks passed!")
          PYEOF
